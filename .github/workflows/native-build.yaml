name: Native build

on:
  push:
    branches:
      - graalvm

env:
  REGISTRY: ghcr.io
  IMAGE:  ${{ github.repository }}

jobs:
  run_tests_build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'
          architecture: x64

      - name: Grant execute permission for gradlew
        run: |
          chmod +x gradlew

      - name: Run tests
        run: |
          ./gradlew clean test

      - name: Build and push native image
        run: |
          ./gradlew bootBuildImage
